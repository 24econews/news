name: Daily Economy Digest

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC = 7:00 AM Argentina/Brazil (UTC-3)
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set SSL certificate path
        run: echo "SSL_CERT_FILE=$(python -c 'import certifi; print(certifi.where())')" >> $GITHUB_ENV

      - name: Run Argentina pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "::group::Argentina pipeline"
          python scheduler/daily_pipeline.py --country argentina
          echo "::endgroup::"

- name: Debug - show load_config function
        run: sed -n '78,88p' scheduler/daily_pipeline.py

      - name: Run Brazil pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "::group::Brazil pipeline"
          python scheduler/daily_pipeline.py --country brazil
          echo "::endgroup::"

      - name: Commit and push new digests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new digest files — nothing to commit"
          else
            git commit -m "Daily digest $(date -u +%Y-%m-%d)"
            git push origin main
            echo "Digests committed and pushed"
          fi
# cache-bust: v2
